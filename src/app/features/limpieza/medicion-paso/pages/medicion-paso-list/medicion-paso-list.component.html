<p-toast />
<p-confirmDialog />

<div class="card">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Mediciones del paso</h2>
            <p class="text-muted-color mt-1">Parámetros medidos durante la ejecución</p>
        </div>
        <p-button label="Nueva medición" icon="pi pi-plus" (onClick)="navigateToCreate()" />
    </div>

    <p-table [value]="items()" [paginator]="true" [rows]="10" responsiveLayout="scroll">
        <ng-template pTemplate="header">
            <tr>
                <th>Parámetro</th>
                <th>Valor obtenido</th>
                <th>Valor esperado</th>
                <th>Unidad</th>
                <th>Cumple</th>
                <th>Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
            <tr>
                <td>{{ item.parametro }}</td>
                <td>{{ item.valorObtenido }}</td>
                <td>{{ item.valorEsperado || '—' }}</td>
                <td>{{ item.unidad || '—' }}</td>
                <td>
                    <p-tag
                        [value]="item.cumple ? 'Sí' : 'No'"
                        [severity]="item.cumple ? 'success' : 'danger'" />
                </td>
                <td>
                    <div class="flex gap-2">
                        <p-button icon="pi pi-pencil" severity="secondary" [rounded]="true" [text]="true" (onClick)="navigateToEdit(item.id)" />
                        <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [text]="true" (onClick)="confirmDelete(item.id)" />
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="6" class="text-center text-muted-color py-8">No hay mediciones registradas</td>
            </tr>
        </ng-template>
    </p-table>
</div>
