<p-toast />

<div class="card">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Editar verificación</h2>
        <p class="text-muted-color mt-1">Modifica los datos de la verificación</p>
    </div>

    @if (verificacion()) {
        <app-verificacion-limpieza-form
            [verificacion]="verificacion()"
            [registroId]="registroId"
            (formSubmit)="onFormSubmit($any($event))" />
    }
</div>
