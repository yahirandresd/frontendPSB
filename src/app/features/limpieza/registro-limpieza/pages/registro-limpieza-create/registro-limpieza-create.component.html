<p-toast />

<div class="card">
    <div class="flex items-center gap-3 mb-6">
        <p-button icon="pi pi-arrow-left" [rounded]="true" [text]="true" severity="secondary" (onClick)="volver()" />
        <div>
            <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Nuevo registro de limpieza</h2>
            <p class="text-muted-color mt-1">Registra una ejecución del programa de limpieza</p>
        </div>
    </div>

    <app-registro-limpieza-form
        [programaId]="programaId"
        (formSubmit)="onFormSubmit($any($event))"
        (cancelar)="volver()" />
</div>
