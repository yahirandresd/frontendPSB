<div class="card">
    <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold mb-6">
        {{ tanqueAlmacenamiento ? 'Editar' : 'Nuevo' }} Tanque Almacenamiento
    </div>
    <form #form="ngForm" (ngSubmit)="onSubmit()">
        <div class="grid grid-cols-12 gap-4">
            <div class="col-span-6">
                <label class="block font-medium mb-1">Fuente Agua</label>
                <p-select name="fuenteAguaId" [(ngModel)]="model.fuenteAguaId" [options]="fuenteAguaItems" optionLabel="nombre" optionValue="id" placeholder="Seleccione" class="w-full" required />
            </div>

            <div class="col-span-3">
                <label class="block font-medium mb-1">Capacidad (Litros)</label>
                <p-inputNumber name="capacidadLitros" [(ngModel)]="model.capacidadLitros" [min]="0" class="w-full" required />
            </div>

            <div class="col-span-6">
                <label class="block font-medium mb-1">Material Grado Alimenticio</label>
                <input pInputText name="materialGradoAlimenticio" [(ngModel)]="model.materialGradoAlimenticio" class="w-full" required />
            </div>

            <div class="col-span-3">
                <label class="block font-medium mb-1">Fecha Último Lavado</label>
                <p-datepicker name="fechaUltimoLavado" [(ngModel)]="model.fechaUltimoLavado" [showIcon]="true" class="w-full" />
            </div>

            <div class="col-span-3 flex items-center gap-2 mt-6">
                <p-checkbox name="tieneTapa" [(ngModel)]="model.tieneTapa" [binary]="true" inputId="tieneTapa" />
                <label for="tieneTapa">Tiene Tapa</label>
            </div>
        </div>

        <div class="flex justify-end gap-2 mt-4">
            <p-button label="Cancelar" severity="secondary" (onClick)="onCancel()" />
            <p-button type="submit" label="Guardar" [loading]="saving" />
        </div>
    </form>
</div>
