<div class="flex flex-col gap-4">
 
    <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Fecha <span class="text-red-500">*</span></label>
        <input pInputText type="date" [(ngModel)]="form.fecha" class="w-full" />
    </div>
 
    <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Nivel de Riesgo <span class="text-red-500">*</span></label>
        <p-select [(ngModel)]="form.nivelRiesgo"
                  [options]="nivelesRiesgo"
                  optionLabel="label"
                  optionValue="value"
                  placeholder="Seleccione el nivel de riesgo"
                  styleClass="w-full" />
    </div>
 
    <!-- String simple, no array -->
    <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Áreas Evaluadas</label>
        <textarea pTextarea
                  [(ngModel)]="form.areasEvaluadas"
                  placeholder="Ej: Bodega, Cocina, Baños..."
                  rows="2"
                  class="w-full"></textarea>
    </div>
 
    <!-- String simple, no array -->
    <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Plagas Identificadas</label>
        <textarea pTextarea
                  [(ngModel)]="form.plagasIdentificadas"
                  placeholder="Ej: Cucarachas, Roedores..."
                  rows="2"
                  class="w-full"></textarea>
    </div>
 
    <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Observaciones</label>
        <textarea pTextarea
                  [(ngModel)]="form.observaciones"
                  placeholder="Observaciones del diagnóstico..."
                  rows="3"
                  class="w-full"></textarea>
    </div>
 
    <div class="flex justify-end gap-2 mt-2">
        <p-button label="Cancelar" severity="secondary" [outlined]="true"
                  (onClick)="onCancelar()" />
        <p-button label="Guardar" icon="pi pi-check" [loading]="guardando"
                  (onClick)="onGuardar()" />
    </div>
 
</div>
