<div class="card">
    <div class="flex justify-between items-center mb-6">
        <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold">Control Potabilidad</div>
        <p-button label="Nuevo" icon="pi pi-plus" routerLink="crear" />
    </div>
    <p-table [value]="items()" [loading]="loading()" [paginator]="true" [rows]="10" stripedRows dataKey="id">
        <ng-template #header>
            <tr>
                <th>Fecha</th>
                <th>Fuente</th>
                <th>Cloro</th>
                <th>pH</th>
                <th>Turbiedad</th>
                <th>Color</th>
                <th>Cumple</th>
                <th class="w-32">Acciones</th>
            </tr>
        </ng-template>
        <ng-template #body let-item>
            <tr>
                <td>{{ item.fechaHora | date:'dd/MM/yyyy HH:mm' }}</td>
                <td>{{ fuenteMap().get(item.fuenteAguaId) || item.fuenteAgua?.nombre || '...' }}</td>
                <td>{{ item.cloroResidual }}</td>
                <td>{{ item.ph }}</td>
                <td>{{ item.turbiedad }}</td>
                <td>{{ item.colorAparente }}</td>
                <td>
                    <p-tag [value]="item.cumpleNorma ? 'Sí' : 'No'" [severity]="item.cumpleNorma ? 'success' : 'danger'" />
                </td>
                <td>
                    <div class="flex gap-2">
                        <p-button icon="pi pi-eye" severity="info" rounded pTooltip="Ver detalle" tooltipPosition="top" [routerLink]="[item.id]" />
                        <p-button icon="pi pi-pencil" severity="secondary" rounded pTooltip="Editar" tooltipPosition="top" [routerLink]="[item.id, 'editar']" />
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template #emptymessage>
            <tr><td colspan="8" class="text-center text-muted-color py-6">No hay registros</td></tr>
        </ng-template>
    </p-table>
</div>
<p-toast />
