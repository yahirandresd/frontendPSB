<div class="card">
    <div class="flex justify-between items-center mb-6">
        <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold">Programas</div>
        <p-button label="Nuevo Programa" icon="pi pi-plus" routerLink="crear" />
    </div>
    <p-table [value]="items()" [loading]="loading()" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[5, 10, 20]" stripedRows dataKey="id">
        <ng-template #header>
            <tr>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Frecuencia</th>
                <th>Responsable</th>
                <th class="w-24">Acciones</th>
            </tr>
        </ng-template>
        <ng-template #body let-item>
            <tr>
                <td>{{ item.nombre }}</td>
                <td><p-tag [value]="item.tipo" [severity]="tagSeverity(item.tipo)" /></td>
                <td>{{ item.frecuencia }}</td>
                <td>{{ item.responsable }}</td>
                <td>
                    <div class="flex gap-2">
                        <p-button icon="pi pi-pencil" severity="secondary" rounded [routerLink]="[item.id, 'editar']" />
                        <p-button icon="pi pi-trash" severity="danger" rounded (onClick)="confirmarEliminar(item)" />
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template #emptymessage>
            <tr><td colspan="5" class="text-center text-muted-color py-6">No hay programas registrados</td></tr>
        </ng-template>
    </p-table>
</div>
<p-confirmDialog />
<p-toast />
