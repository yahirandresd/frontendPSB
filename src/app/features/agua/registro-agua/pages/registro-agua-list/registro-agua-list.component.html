<div class="card">
    <div class="flex items-center mb-6">
        <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold">Registro Agua</div>
    </div>
    <p-table [value]="items()" [loading]="loading()" [paginator]="true" [rows]="10" stripedRows dataKey="id">
        <ng-template #header><tr>
                <th>Programa Agua</th>
                <th>Tipo Actividad</th>
                <th>Resultado General</th>
                <th class="w-32">Acciones</th>
            </tr></ng-template>
        <ng-template #body let-item>            <tr>
                <td>{{ programaMap().get(item.programaAguaId) || '...' }}</td>
                <td>{{ item.tipoActividad }}</td>
                <td>{{ item.resultadoGeneral }}</td>
                <td>
                    <p-button icon="pi pi-eye" severity="info" rounded pTooltip="Ver detalle" tooltipPosition="top" [routerLink]="[item.id]" />
                </td>
            </tr></ng-template>
        <ng-template #emptymessage>
            <tr><td colspan="4" class="text-center text-muted-color py-6">No hay registros</td></tr>
        </ng-template>
    </p-table>
</div>
<p-toast />
