<p-toast />

@if (cargando()) {
    <div class="flex justify-center items-center py-24">
        <p-progressSpinner strokeWidth="4" />
    </div>
} @else if (usuario()) {
    <div class="card">
        <div class="flex items-center gap-3 mb-6">
            <i class="pi pi-pencil text-2xl" style="color: var(--p-primary-color);"></i>
            <div>
                <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Editar usuario</h2>
                <p class="text-muted-color mt-1">{{ usuario()!.nombre }}</p>
            </div>
        </div>
        <app-usuario-form [usuario]="usuario()!" (formSubmit)="onSubmit($event)" />
    </div>
}
