<div class="card">
    <div class="flex justify-between items-center mb-6">
        <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold">
            Configuración Inicial — Empresa
        </div>
        <p-button label="Nueva Empresa" icon="pi pi-plus" routerLink="crear" />
    </div>

    <p-table
        [value]="empresas()"
        [loading]="loading()"
        [paginator]="true"
        [rows]="10"
        stripedRows
        dataKey="id"
    >
        <ng-template #header>
            <tr>
                <th>Nombre</th>
                <th>NIT</th>
                <th>Tipo de negocio</th>
                <th>Representante legal</th>
                <th class="w-24">Acciones</th>
            </tr>
        </ng-template>
        <ng-template #body let-item>
            <tr>
                <td>{{ item.nombre }}</td>
                <td>{{ item.nit }}</td>
                <td>{{ item.tipo_negocio }}</td>
                <td>{{ item.representante }}</td>
                <td>
                    <p-button icon="pi pi-pencil" severity="secondary" rounded [routerLink]="[item.id, 'editar']" />
                </td>
            </tr>
        </ng-template>
        <ng-template #emptymessage>
            <tr>
                <td colspan="5" class="text-center text-muted-color py-6">
                    No hay empresa registrada. Haz clic en <strong>Nueva Empresa</strong> para comenzar.
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-toast />
