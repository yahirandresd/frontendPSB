<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Fecha <span class="text-red-500">*</span></label>
            <input pInputText formControlName="fecha" type="date" />
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Estado <span class="text-red-500">*</span></label>
            <p-select formControlName="estado" [options]="estadoOpciones" optionLabel="label" optionValue="value" placeholder="Selecciona estado" />
        </div>
    </div>

    <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Realizado por <span class="text-red-500">*</span></label>
        <input pInputText formControlName="realizadoPor" placeholder="Nombre del responsable" />
    </div>

    <div class="flex flex-col gap-1">
        <label class="font-medium text-sm">Observaciones</label>
        <textarea pTextarea formControlName="observaciones" rows="3" placeholder="Observaciones adicionales..."></textarea>
    </div>

    <div class="flex justify-end gap-2 mt-2">
        <p-button
            type="submit"
            [label]="registro ? 'Actualizar' : 'Guardar'"
            [disabled]="form.invalid" />
    </div>
</form>
