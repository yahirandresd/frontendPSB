<div class="flex flex-col gap-4">
 
    <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Año de Vigencia <span class="text-red-500">*</span></label>
            <p-inputnumber [(ngModel)]="form.anioVigencia" [useGrouping]="false"
                           placeholder="2025" class="w-full" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Responsable <span class="text-red-500">*</span></label>
            <input pInputText [(ngModel)]="form.responsable"
                   placeholder="Nombre del responsable" class="w-full" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Frecuencia de Control</label>
            <p-select [(ngModel)]="form.frecuenciaControl" [options]="frecuencias"
                      placeholder="Seleccione la frecuencia" styleClass="w-full" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Método de Control</label>
            <p-select [(ngModel)]="form.metodoControl" [options]="metodos"
                      placeholder="Seleccione el método" styleClass="w-full" />
        </div>
    </div>
 
    <div class="flex justify-end gap-2 mt-2">
        <p-button label="Cancelar" severity="secondary" [outlined]="true"
                  (onClick)="onCancelar()" />
        <p-button label="Guardar" icon="pi pi-check" [loading]="guardando"
                  (onClick)="onGuardar()" />
    </div>
</div>
