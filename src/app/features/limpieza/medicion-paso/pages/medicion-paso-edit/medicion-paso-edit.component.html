<p-toast />

<div class="card">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Editar medición</h2>
        <p class="text-muted-color mt-1">Modifica los datos de la medición</p>
    </div>

    @if (medicion()) {
        <app-medicion-paso-form
            [medicion]="medicion()"
            [checklistId]="checklistId"
            (formSubmit)="onFormSubmit($any($event))" />
    }
</div>
