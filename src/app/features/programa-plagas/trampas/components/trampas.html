<div class="flex flex-col gap-4">
    <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Código <span class="text-red-500">*</span></label>
            <input pInputText [(ngModel)]="form.codigo" placeholder="Ej: TR-BOD-01" class="w-full" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Tipo <span class="text-red-500">*</span></label>
            <p-select [(ngModel)]="form.tipo" [options]="tipos"
                      optionLabel="label" optionValue="value"
                      placeholder="Seleccione el tipo" styleClass="w-full" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Ubicación</label>
            <input pInputText [(ngModel)]="form.ubicacion" placeholder="Ej: Esquina norte bodega" class="w-full" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Estado</label>
            <p-select [(ngModel)]="form.estado" [options]="estados"
                      optionLabel="label" optionValue="value"
                      placeholder="Seleccione el estado" styleClass="w-full" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Fecha Instalación</label>
            <input pInputText type="date" [(ngModel)]="form.fecha_instalacion" class="w-full" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Fecha de Revisión</label>
            <input pInputText type="date" [(ngModel)]="form.fecha_revision" class="w-full" />
        </div>
        <div class="flex flex-col gap-1 col-span-2">
            <label class="font-medium text-sm">
                Acciones Correctivas
                <span class="text-xs text-muted-color ml-1">(una por línea)</span>
            </label>
            <textarea pTextarea [(ngModel)]="accionesCorrectivasTexto" rows="3"
                      class="w-full" placeholder="Escriba cada acción correctiva en una línea..."></textarea>
        </div>
    </div>
    <div class="flex justify-end gap-2 mt-2">
        <p-button label="Cancelar" severity="secondary" [outlined]="true" (onClick)="onCancelar()" />
        <p-button label="Guardar" icon="pi pi-check" [loading]="guardando" (onClick)="onGuardar()" />
    </div>
</div>
