<div class="card">
    <div class="flex items-center justify-between mb-6">
        <h5 class="text-xl font-semibold text-surface-900 dark:text-surface-0">
            <i class="pi pi-clipboard mr-2"></i>Registros de Control de Plagas
        </h5>
        <p-button label="Nuevo Registro" icon="pi pi-plus" (onClick)="abrirFormulario()" />
    </div>
 
    <p-table [value]="registros" [loading]="cargando" [paginator]="true" [rows]="10"
             styleClass="p-datatable-gridlines" responsiveLayout="scroll">
        <ng-template pTemplate="header">
            <tr>
                <th>Tipo de Actividad</th>
                <th>Resultado General</th>
                <th class="text-center">Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-r>
            <tr>
                <td>{{ r.TipoActividad }}</td>
                <td><p-tag [value]="r.resultadoGeneral" [severity]="getSeveridadResultado(r.resultadoGeneral)" /></td>
                <td class="text-center">
                    <div class="flex justify-center gap-2">
                        <p-button icon="pi pi-exclamation-triangle" severity="warn" [text]="true"
                                  (onClick)="verHallazgos(r)" pTooltip="Ver hallazgos" />
                        <p-button icon="pi pi-images" severity="info" [text]="true"
                                  (onClick)="verEvidencias(r)" pTooltip="Ver evidencias" />
                        <p-button icon="pi pi-eye" severity="info" [text]="true"
                                  (onClick)="verDetalle(r)" pTooltip="Ver detalle" />
                        <p-button icon="pi pi-pencil" severity="secondary" [text]="true"
                                  (onClick)="abrirFormulario(r)" pTooltip="Editar" />
                        <p-button icon="pi pi-trash" severity="danger" [text]="true"
                                  (onClick)="confirmarEliminar(r)" pTooltip="Eliminar" />
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr><td colspan="3" class="text-center text-muted-color py-6">No hay registros de control de plagas.</td></tr>
        </ng-template>
    </p-table>
</div>
 
<p-dialog [(visible)]="mostrarFormulario"
          [header]="registroSeleccionado ? 'Editar Registro' : 'Nuevo Registro'"
          [modal]="true" [style]="{ width: '600px' }" [closable]="true">
    <app-registro-plagas-form
        [registro]="registroSeleccionado"
        [usuarios]="usuarios"
        (guardado)="onGuardado()"
        (cancelado)="mostrarFormulario = false" />
</p-dialog>
 
<p-dialog [(visible)]="mostrarDetalle" header="Detalle del Registro"
          [modal]="true" [style]="{ width: '560px' }">
    @if (registroSeleccionado) {
        <div class="grid grid-cols-2 gap-x-6 gap-y-3 text-sm">
            <span class="text-muted-color">Tipo de Actividad</span>
            <span class="font-medium">{{ registroSeleccionado.TipoActividad }}</span>
            <span class="text-muted-color">Resultado</span>
            <p-tag [value]="registroSeleccionado.resultadoGeneral"
                   [severity]="getSeveridadResultado(registroSeleccionado.resultadoGeneral)" />
        </div>
    }
    <ng-template pTemplate="footer">
        <p-button label="Cerrar" severity="secondary" [outlined]="true"
                  (onClick)="mostrarDetalle = false" />
    </ng-template>
</p-dialog>
 
<p-confirmDialog />
<p-toast />
