<p-toast />

<div class="card">
    <div class="flex items-center gap-3 mb-6">
        <p-button icon="pi pi-arrow-left" [rounded]="true" [text]="true" severity="secondary" (onClick)="volver()" />
        <div>
            <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Editar equipo / área</h2>
            <p class="text-muted-color mt-1">Modifica los datos del equipo o área</p>
        </div>
    </div>

    @if (equipo()) {
        <app-equipo-area-form
            [equipo]="equipo()"
            (formSubmit)="onFormSubmit($any($event))"
            (cancelar)="volver()" />
    }
</div>
