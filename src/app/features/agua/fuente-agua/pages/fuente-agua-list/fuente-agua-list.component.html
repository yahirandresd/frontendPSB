<div class="card">
    <div class="flex justify-between items-center mb-6">
        <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold">Fuente Agua</div>
        <p-button label="Nuevo" icon="pi pi-plus" routerLink="crear" />
    </div>
    <p-table [value]="items()" [loading]="loading()" [paginator]="true" [rows]="10" stripedRows dataKey="id">
        <ng-template #header><tr>
                <th>#</th>
                <th>Programa Agua</th>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Proveedor</th>
                <th>Ubicación</th>
                <th>Requiere Tanque</th>
                <th class="w-24">Acciones</th>
            </tr></ng-template>
        <ng-template #body let-item>            <tr>
                <td>{{ item.programaAguaId }}</td>
                <td>{{ item.programaAguaId }}</td>
                <td>{{ item.nombre }}</td>
                <td>{{ item.tipo }}</td>
                <td>{{ item.proveedor }}</td>
                <td>{{ item.ubicacion }}</td>
                <td><i [class]="item.requiereTanque ? 'pi pi-check text-green-500' : 'pi pi-times text-red-500'"></i></td>
                <td><p-button icon="pi pi-pencil" severity="secondary" rounded [routerLink]="[item.id, 'editar']" /></td>
            </tr></ng-template>
        <ng-template #emptymessage>
            <tr><td colspan="8" class="text-center text-muted-color py-6">No hay registros</td></tr>
        </ng-template>
    </p-table>
</div>
<p-toast />
