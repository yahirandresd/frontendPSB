<div class="card">
    <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold mb-6">
        {{ programaAgua ? 'Editar' : 'Nuevo' }} Programa de Agua
    </div>

    <form #form="ngForm" (ngSubmit)="onSubmit()" class="grid grid-cols-12 gap-4">
        <div class="col-span-12 flex flex-col gap-2">
            <label for="objetivo" class="font-medium">Objetivo</label>
            <textarea
                id="objetivo"
                pInputTextarea
                [(ngModel)]="model.objetivo"
                name="objetivo"
                rows="3"
                class="w-full"
                required
            ></textarea>
            @if (submitted && !model.objetivo) {
                <small class="text-red-500">El objetivo es requerido</small>
            }
        </div>

        <div class="col-span-12 flex flex-col gap-2">
            <label for="alcance" class="font-medium">Alcance</label>
            <textarea
                id="alcance"
                pInputTextarea
                [(ngModel)]="model.alcance"
                name="alcance"
                rows="3"
                class="w-full"
                required
            ></textarea>
            @if (submitted && !model.alcance) {
                <small class="text-red-500">El alcance es requerido</small>
            }
        </div>

        <div class="col-span-12 flex flex-col gap-2">
            <label for="procedimientoGeneral" class="font-medium">Procedimiento General</label>
            <textarea
                id="procedimientoGeneral"
                pInputTextarea
                [(ngModel)]="model.procedimientoGeneral"
                name="procedimientoGeneral"
                rows="4"
                class="w-full"
                required
            ></textarea>
            @if (submitted && !model.procedimientoGeneral) {
                <small class="text-red-500">El procedimiento general es requerido</small>
            }
        </div>

        <div class="col-span-12 flex justify-end gap-2 mt-4">
            <p-button label="Cancelar" severity="secondary" (onClick)="onCancel()" />
            <p-button type="submit" label="Guardar" [loading]="saving" />
        </div>
    </form>
</div>
