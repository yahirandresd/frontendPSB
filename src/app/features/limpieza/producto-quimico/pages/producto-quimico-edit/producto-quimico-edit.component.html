<p-toast />

<div class="card">
    <div class="flex items-center gap-3 mb-6">
        <p-button icon="pi pi-arrow-left" [rounded]="true" [text]="true" severity="secondary" (onClick)="volver()" />
        <div>
            <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Editar producto químico</h2>
            <p class="text-muted-color mt-1">Modifica los datos del producto químico</p>
        </div>
    </div>

    @if (cargando()) {
        <div class="flex justify-center py-12">
            <p-progressSpinner strokeWidth="4" />
        </div>
    } @else if (producto()) {
        <app-producto-quimico-form
            [producto]="producto()!"
            (formSubmit)="onSubmit($event)"
            (cancelar)="volver()" />
    }
</div>
