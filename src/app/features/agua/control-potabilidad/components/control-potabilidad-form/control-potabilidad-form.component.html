<div class="card">
    <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold mb-6">
        {{ controlPotabilidad ? 'Editar' : 'Nuevo' }} Control Potabilidad
    </div>
    <form #form="ngForm" (ngSubmit)="onSubmit()">
        <div class="grid grid-cols-12 gap-4">
            <div class="col-span-6">
                <label class="block font-medium mb-1">Fuente de Agua</label>
                <p-select name="fuenteAguaId" [(ngModel)]="model.fuenteAguaId" [options]="fuentesAgua" optionLabel="nombre" optionValue="id" placeholder="Seleccione" class="w-full" required />
            </div>
            <div class="col-span-3">
                <label class="block font-medium mb-1">Fecha y Hora</label>
                <p-datepicker name="fechaHora" [(ngModel)]="model.fechaHora" [showTime]="true" hourFormat="24" [showIcon]="true" class="w-full" required />
            </div>
            <div class="col-span-3">
                <label class="block font-medium mb-1">Punto de Captación</label>
                <input pInputText name="puntoCaptacion" [(ngModel)]="model.puntoCaptacion" class="w-full" required />
            </div>

            <div class="col-span-3">
                <label class="block font-medium mb-1">Cloro Residual (mg/L)</label>
                <p-inputNumber name="cloroResidual" [(ngModel)]="model.cloroResidual" [min]="0" [max]="5" [step]="0.1" [minFractionDigits]="1" [maxFractionDigits]="2" class="w-full" required />
            </div>
            <div class="col-span-3">
                <label class="block font-medium mb-1">pH</label>
                <p-inputNumber name="ph" [(ngModel)]="model.ph" [min]="0" [max]="14" [step]="0.1" [minFractionDigits]="1" [maxFractionDigits]="2" class="w-full" required />
            </div>
            <div class="col-span-3">
                <label class="block font-medium mb-1">Turbiedad (UNT)</label>
                <p-inputNumber name="turbiedad" [(ngModel)]="model.turbiedad" [min]="0" [step]="0.1" [minFractionDigits]="1" [maxFractionDigits]="2" class="w-full" required />
            </div>
            <div class="col-span-3">
                <label class="block font-medium mb-1">Color Aparente (UPC)</label>
                <p-inputNumber name="colorAparente" [(ngModel)]="model.colorAparente" [min]="0" [max]="500" class="w-full" required />
            </div>

            <div class="col-span-3">
                <label class="block font-medium mb-1">Temperatura (°C)</label>
                <p-inputNumber name="temperatura" [(ngModel)]="model.temperatura" [min]="-10" [max]="100" [step]="0.1" class="w-full" />
            </div>
            <div class="col-span-6">
                <label class="block font-medium mb-1">Responsable de la Muestra</label>
                <input pInputText name="responsableMuestra" [(ngModel)]="model.responsableMuestra" class="w-full" required />
            </div>
        </div>

        <div class="mt-4">
            <label class="block font-medium mb-1">Observaciones</label>
            <textarea pTextarea name="observaciones" [(ngModel)]="model.observaciones" rows="3" class="w-full"></textarea>
        </div>

        <div class="mt-4">
            <label class="block font-medium mb-1">Foto de evidencia</label>
            <p-fileUpload
                [url]="uploadUrl"
                name="file"
                accept="image/*"
                maxFileSize="5000000"
                chooseLabel="Seleccionar foto"
                [auto]="false"
                mode="basic"
                (onUpload)="onUpload($event)">
            </p-fileUpload>
            @if (model.evidenciaFoto) {
                <div class="mt-2">
                    <img [src]="model.evidenciaFoto" class="w-32 h-32 object-cover rounded-lg shadow-sm" />
                </div>
            }
        </div>

        <div class="flex justify-end gap-2 mt-4">
            <p-button label="Cancelar" severity="secondary" (onClick)="onCancel()" />
            <p-button type="submit" label="Guardar" [loading]="saving" />
        </div>
    </form>
</div>
