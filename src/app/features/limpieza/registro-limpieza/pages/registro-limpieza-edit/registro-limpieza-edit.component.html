<p-toast />

<div class="card">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Editar registro de limpieza</h2>
        <p class="text-muted-color mt-1">Modifica los datos del registro</p>
    </div>

    @if (registro()) {
        <app-registro-limpieza-form
            [registro]="registro()"
            [programaId]="programaId"
            (formSubmit)="onFormSubmit($any($event))" />
    }
</div>
