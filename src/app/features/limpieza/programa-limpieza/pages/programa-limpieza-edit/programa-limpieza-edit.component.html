<p-toast />

<div class="card">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Editar programa de limpieza</h2>
        <p class="text-muted-color mt-1">Modifica los datos del programa</p>
    </div>

    @if (programa()) {
        <app-programa-limpieza-form
            [programa]="programa()"
            (formSubmit)="onFormSubmit($any($event))" />
    }
</div>
