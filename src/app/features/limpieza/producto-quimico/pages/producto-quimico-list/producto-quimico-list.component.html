<p-toast />
<p-confirmDialog />

<div class="card">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Productos Químicos</h2>
            <p class="text-muted-color mt-1">Gestión de productos químicos autorizados para limpieza y desinfección</p>
        </div>
        <button pButton label="Nuevo producto" icon="pi pi-plus" (click)="irACrear()"></button>
    </div>

    <p-table
        [value]="productos()"
        [loading]="cargando()"
        [paginator]="true"
        [rows]="10"
        [rowsPerPageOptions]="[10, 25, 50]"
        styleClass="p-datatable-sm"
        emptyMessage="No hay productos químicos registrados">

        <ng-template pTemplate="header">
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Fabricante</th>
                <th>Reg. INVIMA</th>
                <th class="text-center w-32">Grado alim.</th>
                <th class="w-36">Acciones</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-prod>
            <tr>
                <td><span class="font-mono text-sm">{{ prod.codigo }}</span></td>
                <td><span class="font-semibold">{{ prod.nombre }}</span></td>
                <td>{{ prod.fabricante }}</td>
                <td><span class="font-mono text-xs text-muted-color">{{ prod.registroSanitarioInvima }}</span></td>
                <td class="text-center">
                    @if (prod.gradoAlimenticio) {
                        <p-tag severity="success" value="Sí" icon="pi pi-check" />
                    } @else {
                        <p-tag severity="secondary" value="No" />
                    }
                </td>
                <td>
                    <div class="flex gap-2">
                        <button pButton icon="pi pi-eye" severity="info" [text]="true" [rounded]="true"
                            (click)="irAVer(prod.id)" pTooltip="Ver"></button>
                        <button pButton icon="pi pi-pencil" severity="secondary" [text]="true" [rounded]="true"
                            (click)="irAEditar(prod.id)" pTooltip="Editar"></button>
                        <button pButton icon="pi pi-trash" severity="danger" [text]="true" [rounded]="true"
                            (click)="confirmarEliminar(prod)" pTooltip="Eliminar"></button>
                    </div>
                </td>
            </tr>
        </ng-template>

    </p-table>
</div>
