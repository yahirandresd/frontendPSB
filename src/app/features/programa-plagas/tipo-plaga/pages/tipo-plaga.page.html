<div class="card">
    <div class="flex items-center justify-between mb-6">
        <h5 class="text-xl font-semibold text-surface-900 dark:text-surface-0">
            <i class="pi pi-list mr-2"></i>Tipos de Plaga
        </h5>
        <p-button label="Nuevo Tipo" icon="pi pi-plus" (onClick)="abrirFormulario()" />
    </div>

    <p-table [value]="tipos" [loading]="cargando" [paginator]="true" [rows]="10"
             styleClass="p-datatable-gridlines" responsiveLayout="scroll">
        <ng-template pTemplate="header">
            <tr>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Riesgo Sanitario</th>
                <th class="text-center">Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-t>
            <tr>
                <td class="font-medium">{{ t.nombre }}</td>
                <td>{{ t.categoria }}</td>
                <td><p-tag [value]="t.riesgoSanitario" [severity]="getRiesgoSeverity(t.riesgoSanitario)" /></td>
                <td class="text-center">
                    <div class="flex justify-center gap-2">
                        <p-button icon="pi pi-pencil" severity="secondary" [text]="true"
                                  (onClick)="abrirFormulario(t)" pTooltip="Editar" />
                        <p-button icon="pi pi-trash" severity="danger" [text]="true"
                                  (onClick)="confirmarEliminar(t)" pTooltip="Eliminar" />
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr><td colspan="4" class="text-center text-muted-color py-6">No hay tipos de plaga registrados.</td></tr>
        </ng-template>
    </p-table>
</div>

<p-dialog [(visible)]="mostrarFormulario"
          [header]="tipoSeleccionado ? 'Editar Tipo de Plaga' : 'Nuevo Tipo de Plaga'"
          [modal]="true" [style]="{ width: '480px' }" [closable]="true">
    <app-tipo-plaga-form
        [tipoPlaga]="tipoSeleccionado"
        (guardado)="onGuardado()"
        (cancelado)="mostrarFormulario = false" />
</p-dialog>

<p-confirmDialog />
<p-toast />
