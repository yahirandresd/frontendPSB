<div class="pr-module">
    <div class="card mb-4">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h2 class="text-surface-900 dark:text-surface-0 font-semibold text-2xl m-0">
                    Programa de Residuos
                </h2>
                <p class="text-muted-color text-sm mt-1 mb-0">
                    Gestión, seguimiento y auditoría de programas ambientales
                </p>
            </div>
            <nav class="pr-subnav" aria-label="Navegación del módulo">
                <a
                    routerLink="/programa-residuos/panel"
                    routerLinkActive="active"
                    class="pr-subnav__link"
                >
                    <i class="pi pi-chart-bar"></i>
                    <span>Panel</span>
                </a>
                <a
                    routerLink="/programa-residuos/programas"
                    routerLinkActive="active"
                    [routerLinkActiveOptions]="{ paths: 'subset', queryParams: 'ignored', fragment: 'ignored', matrixParams: 'ignored' }"
                    class="pr-subnav__link"
                >
                    <i class="pi pi-list"></i>
                    <span>Programas</span>
                </a>
                <a
                    routerLink="/programa-residuos/recolecciones"
                    routerLinkActive="active"
                    class="pr-subnav__link"
                >
                    <i class="pi pi-truck"></i>
                    <span>Recolecciones</span>
                </a>
            </nav>
        </div>
    </div>

    <router-outlet />
</div>
