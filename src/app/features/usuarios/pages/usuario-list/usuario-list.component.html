<p-toast />

<div class="card">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Usuarios</h2>
            <p class="text-muted-color mt-1">Gestión de usuarios y permisos del sistema</p>
        </div>
        <button pButton label="Nuevo usuario" icon="pi pi-user-plus" (click)="irACrear()"></button>
    </div>

    <p-table
        [value]="usuarios()"
        [loading]="cargando()"
        [paginator]="true"
        [rows]="10"
        [rowsPerPageOptions]="[10, 25, 50]"
        styleClass="p-datatable-sm"
        emptyMessage="No hay usuarios registrados">

        <ng-template pTemplate="header">
            <tr>
                <th>Usuario</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Cargo</th>
                <th class="text-center w-28">Estado</th>
                <th class="w-28">Acciones</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-u>
            <tr>
                <td>
                    <div class="flex items-center gap-3">
                        <p-avatar [label]="iniciales(u.nombre)" shape="circle" size="normal"
                            styleClass="font-bold text-sm"
                            [style]="{ background: 'color-mix(in srgb, var(--p-primary-color) 15%, transparent)', color: 'var(--p-primary-color)' }" />
                        <span class="font-semibold">{{ u.nombre }}</span>
                    </div>
                </td>
                <td class="text-muted-color text-sm">{{ u.email }}</td>
                <td><p-tag [value]="u.rol | titlecase" [severity]="rolSeverity(u.rol)" /></td>
                <td class="text-muted-color text-sm">{{ u.cargo || '—' }}</td>
                <td class="text-center">
                    @if (u.estado === 'activo') {
                        <p-tag severity="success" value="Activo" icon="pi pi-check-circle" />
                    } @else {
                        <p-tag severity="secondary" value="Inactivo" icon="pi pi-ban" />
                    }
                </td>
                <td>
                    <div class="flex gap-1">
                        <button pButton icon="pi pi-eye" severity="info" [text]="true" [rounded]="true"
                            (click)="irAVer(u.id)" pTooltip="Ver perfil"></button>
                        <button pButton icon="pi pi-pencil" severity="secondary" [text]="true" [rounded]="true"
                            (click)="irAEditar(u.id)" pTooltip="Editar"></button>
                    </div>
                </td>
            </tr>
        </ng-template>

    </p-table>
</div>
