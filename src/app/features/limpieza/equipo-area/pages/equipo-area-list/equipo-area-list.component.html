<p-toast />
<p-confirmDialog />

<div class="card">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Equipos y Áreas</h2>
            <p class="text-muted-color mt-1">Gestión de equipos, áreas y utensilios sujetos a limpieza</p>
        </div>
        <button pButton label="Nuevo equipo / área" icon="pi pi-plus" (click)="irACrear()"></button>
    </div>

    <p-table
        [value]="equipos()"
        [loading]="cargando()"
        [paginator]="true"
        [rows]="10"
        [rowsPerPageOptions]="[10, 25, 50]"
        styleClass="p-datatable-sm"
        emptyMessage="No hay equipos o áreas registrados">

        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="nombre">Nombre <p-sortIcon field="nombre" /></th>
                <th>Tipo</th>
                <th>Estado</th>
                <th>Empresa</th>
                <th class="w-28">Acciones</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-eq>
            <tr>
                <td class="font-medium">{{ eq.nombre }}</td>
                <td>
                    <p-tag [value]="tipoLabel(eq.tipo)" [severity]="tipoSeverity(eq.tipo)" />
                </td>
                <td>
                    <p-tag [value]="eq.estado" [severity]="estadoSeverity(eq.estado)" />
                </td>
                <td>
                    <span class="font-mono text-xs text-muted-color">{{ eq.empresaId | slice:0:8 }}...</span>
                </td>
                <td>
                    <div class="flex gap-2">
                        <button
                            pButton
                            icon="pi pi-pencil"
                            severity="secondary"
                            [text]="true"
                            [rounded]="true"
                            (click)="irAEditar(eq.id)"
                            pTooltip="Editar" />
                        <button
                            pButton
                            icon="pi pi-trash"
                            severity="danger"
                            [text]="true"
                            [rounded]="true"
                            (click)="confirmarEliminar(eq)"
                            pTooltip="Eliminar" />
                    </div>
                </td>
            </tr>
        </ng-template>

    </p-table>
</div>
