<div class="card">
    <div class="flex justify-between items-center mb-6">
        <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold">Registros</div>
        <p-button label="Nuevo Registro" icon="pi pi-plus" routerLink="crear" />
    </div>
    <p-table [value]="items()" [loading]="loading()" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[5, 10, 20]" stripedRows dataKey="id">
        <ng-template #header>
            <tr>
                <th>Fecha</th>
                <th>Hora Inicio</th>
                <th>Hora Fin</th>
                <th>Estado</th>
                <th>Observaciones</th>
                <th class="w-32">Acciones</th>
            </tr>
        </ng-template>
        <ng-template #body let-item>
            <tr>
                <td>{{ item.fecha | date:'dd/MM/yyyy' }}</td>
                <td>{{ item.horaInicio || '-' }}</td>
                <td>{{ item.horaFin || '-' }}</td>
                <td><p-tag [value]="item.estado" [severity]="estadoSeverity(item.estado)" /></td>
                <td>{{ (item.observaciones || '') | slice:0:60 }}{{ (item.observaciones?.length ?? 0) > 60 ? '...' : '' }}</td>
                <td>
                    <div class="flex gap-2">
                        <p-button icon="pi pi-check" severity="success" rounded (onClick)="completar(item)" />
                        <p-button icon="pi pi-times" severity="danger" rounded (onClick)="rechazar(item)" />
                        <p-button icon="pi pi-pencil" severity="secondary" rounded [routerLink]="[item.id, 'editar']" />
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template #emptymessage>
            <tr><td colspan="6" class="text-center text-muted-color py-6">No hay registros</td></tr>
        </ng-template>
    </p-table>
</div>
<p-confirmDialog />
<p-toast />
