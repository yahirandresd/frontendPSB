<div class="card">
    <div class="flex justify-between items-center mb-6">
        <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold">Tanque Almacenamiento</div>
        <p-button label="Nuevo" icon="pi pi-plus" routerLink="crear" />
    </div>
    <p-table [value]="items()" [loading]="loading()" [paginator]="true" [rows]="10" stripedRows dataKey="id">
        <ng-template #header><tr>
                <th>Fuente Agua</th>
                <th>Capacidad (Litros)</th>
                <th>Material Grado Alimenticio</th>
                <th>Fecha Último Lavado</th>
                <th>Tiene Tapa</th>
                <th class="w-32">Acciones</th>
            </tr></ng-template>
        <ng-template #body let-item>            <tr>
                <td>{{ fuenteMap().get(item.fuenteAguaId) || '...' }}</td>
                <td>{{ item.capacidadLitros }}</td>
                <td>{{ item.materialGradoAlimenticio }}</td>
                <td>{{ item.fechaUltimoLavado }}</td>
                <td><i [class]="item.tieneTapa ? 'pi pi-check text-green-500' : 'pi pi-times text-red-500'"></i></td>
                <td>
                    <div class="flex gap-2">
                        <p-button icon="pi pi-eye" severity="info" rounded pTooltip="Ver detalle" tooltipPosition="top" [routerLink]="[item.id]" />
                        <p-button icon="pi pi-pencil" severity="secondary" rounded pTooltip="Editar" tooltipPosition="top" [routerLink]="[item.id, 'editar']" />
                    </div>
                </td>
            </tr></ng-template>
        <ng-template #emptymessage>
            <tr><td colspan="6" class="text-center text-muted-color py-6">No hay registros</td></tr>
        </ng-template>
    </p-table>
</div>
<p-toast />
