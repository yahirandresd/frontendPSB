<p-toast />
<p-confirmDialog />

<div class="card">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Pasos de Limpieza</h2>
            <p class="text-muted-color mt-1">Pasos del programa <span class="font-mono text-xs">{{ programaId | slice:0:8 }}...</span></p>
        </div>
        <button pButton label="Nuevo paso" icon="pi pi-plus" (click)="irACrear()"></button>
    </div>

    <p-table
        [value]="pasos()"
        [loading]="cargando()"
        [paginator]="true"
        [rows]="10"
        styleClass="p-datatable-sm"
        emptyMessage="No hay pasos registrados para este programa">

        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="orden" class="w-20">Orden <p-sortIcon field="orden" /></th>
                <th>Tipo de acción</th>
                <th>Descripción</th>
                <th>Frecuencia</th>
                <th>Concentración</th>
                <th class="w-28">Acciones</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-paso>
            <tr>
                <td class="text-center font-bold">{{ paso.orden }}</td>
                <td class="font-medium">{{ paso.tipoAccion }}</td>
                <td><span class="line-clamp-2 text-sm">{{ paso.descripcion }}</span></td>
                <td>{{ paso.frecuencia }}</td>
                <td>{{ paso.concentracion || '—' }}</td>
                <td>
                    <div class="flex gap-2">
                        <button pButton icon="pi pi-pencil" severity="secondary" [text]="true" [rounded]="true" (click)="irAEditar(paso.id)" pTooltip="Editar" />
                        <button pButton icon="pi pi-trash" severity="danger" [text]="true" [rounded]="true" (click)="confirmarEliminar(paso)" pTooltip="Eliminar" />
                    </div>
                </td>
            </tr>
        </ng-template>

    </p-table>
</div>
