<p-toast />
<p-confirmDialog />

<div class="card">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Checklist de limpieza</h2>
            <p class="text-muted-color mt-1">Pasos verificados en este registro</p>
        </div>
        <p-button label="Agregar paso" icon="pi pi-plus" (onClick)="navigateToCreate()" />
    </div>

    <p-table [value]="items()" [paginator]="true" [rows]="10" responsiveLayout="scroll">
        <ng-template pTemplate="header">
            <tr>
                <th>Paso ID</th>
                <th>Estado</th>
                <th>Verificaciones</th>
                <th>Observación</th>
                <th>Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
            <tr>
                <td class="text-xs font-mono text-muted-color">{{ item.pasoLimpiezaId | slice:0:8 }}…</td>
                <td>
                    <p-tag
                        [value]="estadoLabel(item.estado)"
                        [severity]="estadoSeverity(item.estado)" />
                </td>
                <td>
                    <div class="flex gap-3 text-sm flex-wrap">
                        <span [class]="item.productoCorrecto ? 'text-green-500' : 'text-surface-400'">
                            <i class="pi" [class.pi-check]="item.productoCorrecto" [class.pi-times]="!item.productoCorrecto"></i> Producto
                        </span>
                        <span [class]="item.concentracionCorrecta ? 'text-green-500' : 'text-surface-400'">
                            <i class="pi" [class.pi-check]="item.concentracionCorrecta" [class.pi-times]="!item.concentracionCorrecta"></i> Conc.
                        </span>
                        <span [class]="item.superficieCubierta ? 'text-green-500' : 'text-surface-400'">
                            <i class="pi" [class.pi-check]="item.superficieCubierta" [class.pi-times]="!item.superficieCubierta"></i> Sup.
                        </span>
                        <span [class]="item.tiempoCumplido ? 'text-green-500' : 'text-surface-400'">
                            <i class="pi" [class.pi-check]="item.tiempoCumplido" [class.pi-times]="!item.tiempoCumplido"></i> Tiempo
                        </span>
                    </div>
                </td>
                <td>{{ item.observacion || '—' }}</td>
                <td>
                    <div class="flex gap-2">
                        <p-button icon="pi pi-pencil" severity="secondary" [rounded]="true" [text]="true" (onClick)="navigateToEdit(item.id)" />
                        <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [text]="true" (onClick)="confirmDelete(item.id)" />
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="5" class="text-center text-muted-color py-8">No hay ítems en el checklist</td>
            </tr>
        </ng-template>
    </p-table>
</div>
