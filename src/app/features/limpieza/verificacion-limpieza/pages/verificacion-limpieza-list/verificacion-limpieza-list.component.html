<p-toast />
<p-confirmDialog />

<div class="card">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-2xl font-bold text-surface-900 dark:text-surface-0 m-0">Verificaciones</h2>
            <p class="text-muted-color mt-1">Resultados de inspección del registro</p>
        </div>
        <p-button label="Nueva verificación" icon="pi pi-plus" (onClick)="navigateToCreate()" />
    </div>

    <p-table [value]="items()" [paginator]="true" [rows]="10" responsiveLayout="scroll">
        <ng-template pTemplate="header">
            <tr>
                <th>Fecha prueba</th>
                <th>Tipo</th>
                <th>Resultado</th>
                <th>Método</th>
                <th>Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
            <tr>
                <td>{{ item.fechaPrueba | slice:0:10 }}</td>
                <td>
                    <p-tag [value]="tipoLabel(item.tipo)" [severity]="tipoSeverity(item.tipo)" />
                </td>
                <td>{{ item.resultado }}</td>
                <td>{{ item.metodoValidacion || '—' }}</td>
                <td>
                    <div class="flex gap-2">
                        <p-button icon="pi pi-pencil" severity="secondary" [rounded]="true" [text]="true" (onClick)="navigateToEdit(item.id)" />
                        <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [text]="true" (onClick)="confirmDelete(item.id)" />
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="5" class="text-center text-muted-color py-8">No hay verificaciones registradas</td>
            </tr>
        </ng-template>
    </p-table>
</div>
